<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echelon AI — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #12141c;
            --bg-card: #161922;
            --border: #232640;
            --border-hover: #3b3f5c;
            --text-primary: #eaecf5;
            --text-secondary: #9ba1b8;
            --text-muted: #5c6180;
            --accent: #6c63ff;
            --accent-hover: #837dff;
            --accent-glow: rgba(108,99,255,0.12);
            --error: #f87171;
            --error-bg: rgba(248,113,113,0.1);
            --warn: #fbbf24;
            --warn-bg: rgba(251,191,36,0.1);
            --success: #34d399;
            --success-bg: rgba(52,211,153,0.1);
            --info: #60a5fa;
            --inactive: #5c6180;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Header ───────────────── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 28px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 26px; height: 26px; color: var(--accent); }
        .logo h1 {
            font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
            background: linear-gradient(135deg, #7c73ff, #a78bfa, #6c63ff);
            background-size: 200% 200%; animation: gradientShift 4s ease infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .nav-link {
            color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            transition: all 0.2s; font-family: inherit;
        }
        .nav-link:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-glow); }
        .time-select {
            background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; cursor: pointer; outline: none; font-family: inherit; transition: border-color 0.15s;
        }
        .time-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .refresh-btn {
            background: linear-gradient(135deg, var(--accent), #8078ff); color: #fff; border: none; border-radius: var(--radius-sm);
            padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 600; font-family: inherit; transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(108,99,255,0.25);
        }
        .refresh-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(108,99,255,0.35); }
        .last-updated { font-size: 11px; color: var(--text-muted); }

        /* ── Layout ───────────────── */
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

        /* ── KPI Row ──────────────── */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 22px; position: relative; overflow: hidden; transition: all 0.2s;
        }
        .kpi-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }
        .kpi-card.total::before { background: var(--accent); }
        .kpi-card.errors::before { background: var(--error); }
        .kpi-card.warnings::before { background: var(--warn); }
        .kpi-card.healthy::before { background: var(--success); }
        .kpi-card.kb::before { background: var(--info); }
        .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
        .kpi-value { font-size: 32px; font-weight: 700; line-height: 1; }
        .kpi-card.errors .kpi-value { color: var(--error); }
        .kpi-card.warnings .kpi-value { color: var(--warn); }
        .kpi-card.healthy .kpi-value { color: var(--success); }
        .kpi-card.kb .kpi-value { color: var(--info); }
        .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* ── Charts Grid ──────────── */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px; transition: border-color 0.2s;
        }
        .chart-card:hover { border-color: var(--border-hover); }
        .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text-primary); letter-spacing: -0.2px; }
        .chart-container { position: relative; width: 100%; }
        .chart-container.timeline { height: 260px; }
        .chart-container.doughnut { height: 240px; display: flex; justify-content: center; }

        /* ── App Status Grid ──────── */
        .apps-section { margin-bottom: 24px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
        .app-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 22px;
            display: flex; align-items: flex-start; gap: 14px; transition: all 0.2s;
        }
        .app-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
        .app-icon {
            width: 42px; height: 42px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .app-icon.critical { background: var(--error-bg); }
        .app-icon.warning { background: var(--warn-bg); }
        .app-icon.healthy { background: var(--success-bg); }
        .app-icon.inactive { background: rgba(74,85,104,0.2); }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .app-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-stats { display: flex; gap: 12px; font-size: 12px; }
        .app-stat { display: flex; align-items: center; gap: 4px; }
        .app-stat .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-error { background: var(--error); }
        .dot-warn { background: var(--warn); }
        .error-link {
            text-decoration: none; color: var(--error); cursor: pointer;
            padding: 2px 8px; border-radius: 6px; border: 1px solid transparent;
            transition: all 0.2s; font-weight: 600;
        }
        .error-link:hover { background: var(--error-bg); border-color: rgba(248,113,113,0.3); }

        /* App filter tabs */
        .app-filter-tab {
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 6px 14px; font-size: 12px; cursor: pointer;
            font-weight: 500; transition: all 0.15s; font-family: inherit;
        }
        .app-filter-tab:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .app-filter-tab.active {
            background: linear-gradient(135deg, var(--accent), #8078ff); color: #fff;
            border-color: var(--accent); box-shadow: 0 2px 8px rgba(108,99,255,0.25);
        }

        /* Clickable status badges */
        .status-link {
            text-decoration: none; cursor: pointer; transition: all 0.2s;
            border-radius: 6px; padding: 2px 4px; margin: -2px -4px;
        }
        .status-link:hover { filter: brightness(1.2); transform: scale(1.05); }
        .status-link .investigate-hint {
            font-size: 9px; opacity: 0; transition: opacity 0.2s; margin-left: 4px;
        }
        .status-link:hover .investigate-hint { opacity: 1; }

        /* Env filter tabs */
        .env-filter-tabs {
            display: flex; gap: 3px; background: var(--bg-card); padding: 3px;
            border-radius: var(--radius-sm); border: 1px solid var(--border);
        }
        .env-tab {
            background: transparent; color: var(--text-muted); border: none;
            border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer;
            font-weight: 600; transition: all 0.15s; font-family: inherit;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .env-tab:hover { color: var(--text-primary); background: var(--bg-secondary); }
        .env-tab.active { background: var(--accent); color: #fff; box-shadow: 0 1px 4px rgba(108,99,255,0.3); }
        .env-tab.active[data-env="dev"] { background: var(--info); box-shadow: 0 1px 4px rgba(96,165,250,0.3); }
        .env-tab.active[data-env="qa"] { background: var(--warn); color: #1a1d2a; box-shadow: 0 1px 4px rgba(251,191,36,0.3); }
        .env-tab.active[data-env="stg"] { background: #a78bfa; box-shadow: 0 1px 4px rgba(167,139,250,0.3); }
        .env-tab.active[data-env="prod"] { background: var(--error); box-shadow: 0 1px 4px rgba(248,113,113,0.3); }

        /* Env status cards */
        .env-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .env-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .env-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .env-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        .env-card[data-env="dev"]::before { background: var(--info); }
        .env-card[data-env="qa"]::before { background: var(--warn); }
        .env-card[data-env="stg"]::before { background: #a78bfa; }
        .env-card[data-env="prod"]::before { background: var(--error); }
        .env-card .env-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .env-card[data-env="dev"] .env-name { color: var(--info); }
        .env-card[data-env="qa"] .env-name { color: var(--warn); }
        .env-card[data-env="stg"] .env-name { color: #a78bfa; }
        .env-card[data-env="prod"] .env-name { color: var(--error); }
        .env-card .env-total { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .env-card .env-detail { font-size: 11px; color: var(--text-muted); }
        .dot-ok { background: var(--success); }
        .app-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 3px 10px; border-radius: 5px; letter-spacing: 0.4px;
        }
        .badge-critical { background: var(--error-bg); color: var(--error); }
        .badge-warning { background: var(--warn-bg); color: var(--warn); }
        .badge-healthy { background: var(--success-bg); color: var(--success); }
        .badge-inactive { background: rgba(74,85,104,0.2); color: var(--inactive); }

        /* ── Error Table ──────────── */
        .errors-section { margin-bottom: 24px; }
        .error-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .error-table th {
            text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border);
        }
        .error-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .error-table tr:hover td { background: rgba(108,99,255,0.06); }
        .error-count {
            background: var(--error-bg); color: var(--error); font-weight: 700;
            padding: 2px 8px; border-radius: 10px; font-size: 12px;
        }
        .error-pattern { color: var(--text-secondary); max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .error-source { color: var(--text-muted); font-size: 12px; }

        /* ── AI Classification Badges ── */
        .ai-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 3px 10px; border-radius: 5px; letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .ai-badge-actionable { background: rgba(248,113,113,0.15); color: #f87171; }
        .ai-badge-noise { background: rgba(92,97,128,0.2); color: #9ba1b8; }
        .ai-badge-transient { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .ai-badge-known_issue { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .ai-badge-configuration { background: rgba(167,139,250,0.15); color: #a78bfa; }
        .ai-badge-dependency { background: rgba(52,211,153,0.15); color: #34d399; }
        .ai-badge-new { background: rgba(108,99,255,0.15); color: #6c63ff; border: 1px dashed rgba(108,99,255,0.3); }
        .ai-confidence {
            font-size: 9px; color: var(--text-muted); font-weight: 500;
        }
        .ai-tooltip {
            position: relative; cursor: help;
        }
        .ai-tooltip .ai-tooltip-text {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--bg-secondary); border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm); padding: 10px 14px;
            font-size: 11px; color: var(--text-secondary); width: 280px;
            box-shadow: var(--shadow-md); z-index: 100; transition: opacity 0.15s;
            line-height: 1.5; text-transform: none; letter-spacing: 0; font-weight: 400;
        }
        .ai-tooltip:hover .ai-tooltip-text { visibility: visible; opacity: 1; }

        /* ── Intelligence Summary Cards ── */
        .intel-section { margin-bottom: 24px; }
        .intel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .intel-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; text-align: center; transition: all 0.2s;
        }
        .intel-card:hover { border-color: var(--border-hover); }
        .intel-emoji { font-size: 22px; margin-bottom: 6px; }
        .intel-count { font-size: 24px; font-weight: 700; }
        .intel-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-top: 2px; }
        .intel-card.actionable .intel-count { color: var(--error); }
        .intel-card.noise .intel-count { color: var(--text-muted); }
        .intel-card.transient .intel-count { color: var(--info); }
        .intel-card.known_issue .intel-count { color: var(--warn); }
        .intel-card.total .intel-count { color: var(--accent); }

        /* ── Loading ──────────────── */
        .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
        .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14,2 14,8 20,8"/>
                <path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/>
            </svg>
            <h1>Echelon AI — Dashboard</h1>
        </div>
        <div class="header-actions">
            <a href="/" class="nav-link">← Chat</a>
            <a href="/architecture" class="nav-link">Architecture</a>
            <div class="app-filter-tabs" style="display:flex;gap:4px;">
                <button class="app-filter-tab active" onclick="setDashApp(null,this)">All Apps</button>
                <button class="app-filter-tab" onclick="setDashApp('myaccount',this)">MyAccount</button>
                <button class="app-filter-tab" onclick="setDashApp('sdp',this)">SDP</button>
            </div>
            <div class="env-filter-tabs" id="env-tabs">
                <button class="env-tab active" data-env="all" onclick="setDashEnv(null,this)">All</button>
                <button class="env-tab" data-env="dev" onclick="setDashEnv('dev',this)">Dev</button>
                <button class="env-tab" data-env="qa" onclick="setDashEnv('qa',this)">QA</button>
                <button class="env-tab" data-env="stg" onclick="setDashEnv('stg',this)">Stg</button>
                <button class="env-tab" data-env="prod" onclick="setDashEnv('prod',this)">Prod</button>
            </div>
            <select class="time-select" id="time-range" onchange="loadDashboard()">
                <option value="60">Last 1 Hour</option>
                <option value="360">Last 6 Hours</option>
                <option value="720">Last 12 Hours</option>
                <option value="1440" selected>Last 24 Hours</option>
                <option value="4320">Last 3 Days</option>
                <option value="10080">Last 7 Days</option>
            </select>
            <button class="refresh-btn" onclick="loadDashboard()">⟳ Refresh</button>
            <span class="last-updated" id="last-updated"></span>
        </div>
    </header>

    <div class="container" id="main-content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading dashboard data…</div>
        </div>
    </div>

    <script>
    const API = window.location.origin;
    let timelineChart = null, levelChart = null;
    let currentApp = null;  // null = all apps
    let currentEnv = null;  // null = all envs

    function setDashApp(appName, btn) {
        currentApp = appName;
        document.querySelectorAll('.app-filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadDashboard();
    }

    function setDashEnv(envName, btn) {
        currentEnv = envName;
        document.querySelectorAll('.env-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadDashboard();
    }

    async function loadDashboard() {
        const minutes = document.getElementById('time-range').value;
        const main = document.getElementById('main-content');
        main.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading dashboard data…</div></div>';

        try {
            let url = `${API}/api/dashboard?minutes=${minutes}`;
            if (currentApp) url += `&app=${encodeURIComponent(currentApp)}`;
            if (currentEnv) url += `&env=${encodeURIComponent(currentEnv)}`;
            const res = await fetch(url);
            const d = await res.json();
            document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            render(d);
        } catch (err) {
            main.innerHTML = `<div class="loading" style="color:var(--error);">Failed to load: ${err.message}</div>`;
        }
    }

    function render(d) {
        const lv = d.level_counts;
        const errors = (lv.ERROR || 0) + (lv.FATAL || 0);
        const warnings = lv.WARN || 0;
        const info = (lv.INFO || 0) + (lv.DEBUG || 0) + (lv.TRACE || 0);
        const kb = d.kb_stats || {};

        document.getElementById('main-content').innerHTML = `
            <!-- KPI Row -->
            <div class="kpi-row">
                <div class="kpi-card total">
                    <div class="kpi-label">Total Log Entries</div>
                    <div class="kpi-value">${d.total_entries.toLocaleString()}</div>
                    <div class="kpi-sub">${d.time_range.minutes >= 1440 ? Math.round(d.time_range.minutes/1440) + ' day(s)' : Math.round(d.time_range.minutes/60) + ' hour(s)'}</div>
                </div>
                <div class="kpi-card errors">
                    <div class="kpi-label">Errors / Fatal</div>
                    <div class="kpi-value">${errors}</div>
                    <div class="kpi-sub">${d.top_error_clusters.length} distinct pattern(s)</div>
                </div>
                <div class="kpi-card warnings">
                    <div class="kpi-label">Warnings</div>
                    <div class="kpi-value">${warnings}</div>
                </div>
                <div class="kpi-card healthy">
                    <div class="kpi-label">Apps Monitored</div>
                    <div class="kpi-value">${d.apps.length}</div>
                    <div class="kpi-sub">${d.apps.filter(a=>a.status==='healthy').length} healthy · ${d.apps.filter(a=>a.status==='critical').length} critical</div>
                </div>
                <div class="kpi-card kb">
                    <div class="kpi-label">AI Intelligence</div>
                    <div class="kpi-value">${kb.error_classifications||0}</div>
                    <div class="kpi-sub">${kb.user_feedback||0} feedback · ${kb.error_patterns||0} patterns</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title">Log Volume Timeline</div>
                    <div class="chart-container timeline"><canvas id="timelineChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Log Level Distribution</div>
                    <div class="chart-container doughnut"><canvas id="levelChart"></canvas></div>
                </div>
            </div>

            <!-- Environment Status -->
            <div class="apps-section">
                <div class="chart-title" style="margin-bottom:14px;">Environment Status${d.current_env ? ' — ' + d.current_env.toUpperCase() : ''}</div>
                <div class="env-grid" id="env-grid"></div>
            </div>

            <!-- App Status -->
            <div class="apps-section">
                <div class="chart-title" style="margin-bottom:14px;">Application Status</div>
                <div class="apps-grid" id="apps-grid"></div>
            </div>

            <!-- AI Intelligence Summary -->
            <div class="intel-section" id="intel-section" style="display:none;">
                <div class="chart-card">
                    <div class="chart-title">🧠 AI Error Intelligence</div>
                    <div class="intel-grid" id="intel-grid"></div>
                    <p style="font-size:11px;color:var(--text-muted);margin-top:10px;">
                        The AI automatically classifies errors during analysis. Over time it learns which errors are real issues vs noise.
                    </p>
                </div>
            </div>

            <!-- Top Error Clusters -->
            <div class="errors-section">
                <div class="chart-card">
                    <div class="chart-title">Top Error Patterns</div>
                    ${d.top_error_clusters.length ? `
                    <table class="error-table">
                        <tr><th>Count</th><th>AI Classification</th><th>Application</th><th>Source</th><th>Error Pattern</th></tr>
                        ${d.top_error_clusters.map(c => {
                            const cls = c.ai_classification;
                            const sev = c.ai_severity;
                            const conf = c.ai_confidence || 0;
                            const userFb = c.user_feedback;
                            const clsEmoji = {actionable:'⚡',noise:'💤',transient:'🔄',known_issue:'📌',configuration:'⚙️',dependency:'🔗'}[cls] || '';
                            const sevEmoji = {critical:'🔴',high:'🟠',medium:'🟡',low:'🔵',noise:'⚪'}[sev] || '';
                            const fbEmoji = {known_issue:'🔵',expected:'✅',noise:'⚪',resolved:'🟢',critical:'🔴'}[userFb] || '';

                            let badgeHtml;
                            if (cls) {
                                const tooltipParts = [];
                                if (sev) tooltipParts.push('Severity: ' + sev);
                                if (conf) tooltipParts.push('Confidence: ' + Math.round(conf*100) + '%');
                                if (c.ai_root_cause) tooltipParts.push('Root cause: ' + esc(c.ai_root_cause));
                                if (c.ai_action) tooltipParts.push('Action: ' + esc(c.ai_action));
                                if (c.ai_seen_count > 1) tooltipParts.push('Seen ' + c.ai_seen_count + '× by AI');
                                const tooltip = tooltipParts.join('\\n');
                                badgeHtml = '<span class="ai-tooltip"><span class="ai-badge ai-badge-' + cls + '">' + clsEmoji + ' ' + cls.replace('_',' ') + '</span>' +
                                    (conf ? '<span class="ai-confidence"> ' + Math.round(conf*100) + '%</span>' : '') +
                                    (tooltip ? '<span class="ai-tooltip-text">' + sevEmoji + ' ' + tooltip.replace(/\\n/g, '<br>') + '</span>' : '') +
                                    '</span>';
                            } else if (userFb) {
                                badgeHtml = '<span class="ai-badge ai-badge-' + (userFb === 'critical' ? 'actionable' : userFb === 'expected' || userFb === 'resolved' ? 'noise' : userFb) + '">' + fbEmoji + ' ' + userFb.replace('_',' ') + '</span>';
                            } else {
                                badgeHtml = '<span class="ai-badge ai-badge-new">✨ New</span>';
                            }
                            return '<tr>' +
                                '<td><span class="error-count">' + c.count + '×</span></td>' +
                                '<td>' + badgeHtml + '</td>' +
                                '<td><span class="app-badge ' + (c.app === 'other' ? 'badge-inactive' : 'badge-healthy') + '" style="font-size:11px;">' + esc(c.app === 'other' ? 'Unknown' : c.app) + '</span></td>' +
                                '<td><span class="error-source">' + esc(c.source) + '</span></td>' +
                                '<td><span class="error-pattern" title="' + esc(c.pattern) + '">' + esc(c.pattern) + '</span></td>' +
                                '</tr>';
                        }).join('')}
                    </table>` : '<p style="color:var(--text-muted);font-size:13px;padding:12px 0;">No errors detected — all clear!</p>'}
                </div>
            </div>
        `;

        // Render charts
        renderTimelineChart(d.timeline);
        renderLevelChart(errors, warnings, info);
        renderEnvCards(d.environments || []);
        renderAppCards(d.apps);
        renderIntelligence(d.top_error_clusters || []);
    }

    function renderTimelineChart(tl) {
        const ctx = document.getElementById('timelineChart');
        if (!ctx) return;
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tl.labels.map(l => l.split(' ')[1] || l),
                datasets: [
                    { label: 'Errors', data: tl.errors, backgroundColor: 'rgba(255,107,107,0.8)', borderRadius: 3, order: 1 },
                    { label: 'Warnings', data: tl.warnings, backgroundColor: 'rgba(255,169,77,0.7)', borderRadius: 3, order: 2 },
                    { label: 'Info', data: tl.info, backgroundColor: 'rgba(108,99,255,0.4)', borderRadius: 3, order: 3 },
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#9ba1b8', font: { size: 11 } } } },
                scales: {
                    x: { stacked: true, ticks: { color: '#6b7194', font: { size: 10 } }, grid: { color: 'rgba(46,49,68,0.5)' } },
                    y: { stacked: true, ticks: { color: '#6b7194', font: { size: 10 } }, grid: { color: 'rgba(46,49,68,0.5)' } }
                }
            }
        });
    }

    function renderLevelChart(errors, warnings, info) {
        const ctx = document.getElementById('levelChart');
        if (!ctx) return;
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Errors/Fatal', 'Warnings', 'Info/Other'],
                datasets: [{
                    data: [errors, warnings, info],
                    backgroundColor: ['rgba(255,107,107,0.85)', 'rgba(255,169,77,0.85)', 'rgba(108,99,255,0.6)'],
                    borderWidth: 0, hoverOffset: 6,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#9ba1b8', font: { size: 11 }, padding: 14 } }
                }
            }
        });
    }

    function renderEnvCards(envs) {
        const grid = document.getElementById('env-grid');
        if (!grid) return;
        const envLabels = { dev: 'Development', qa: 'QA / Testing', stg: 'Staging', prod: 'Production' };
        const statusIcons = { critical: '🔴', warning: '⚠️', healthy: '✅', inactive: '💤' };
        grid.innerHTML = envs.map(ev => {
            const label = envLabels[ev.env] || ev.env.toUpperCase();
            return `
            <div class="env-card" data-env="${ev.env}" onclick="setDashEnv('${ev.env}', document.querySelector('.env-tab[data-env=&quot;${ev.env}&quot;]'))">
                <div class="env-name">${statusIcons[ev.status] || '❓'} ${esc(label)}</div>
                <div class="env-total">${ev.total.toLocaleString()}</div>
                <div class="env-detail">${ev.errors} errors · ${ev.warnings} warnings</div>
            </div>`;
        }).join('');
    }

    function renderAppCards(apps) {
        const grid = document.getElementById('apps-grid');
        if (!grid) return;
        grid.innerHTML = apps.map(app => {
            const icons = { critical: '🔴', warning: '⚠️', healthy: '✅', inactive: '💤' };
            const badges = {
                critical: 'badge-critical', warning: 'badge-warning',
                healthy: 'badge-healthy', inactive: 'badge-inactive'
            };
            const displayName = app.name.length <= 4 ? app.name.toUpperCase() : app.name.charAt(0).toUpperCase() + app.name.slice(1);

            // Build AI investigation prompt based on status
            const prompts = {
                critical: `Analyze the recent errors and critical issues in ${app.name} application. What is happening, what is the root cause, and how can we fix it?`,
                warning: `There are warnings in ${app.name} application. Analyze the recent warnings — what do they indicate and should we be concerned?`,
                inactive: `The ${app.name} application (${app.description}) is showing as INACTIVE with 0 log entries. Can you investigate why? Check if the Splunk index "${app.name}" is reachable, if the application is running, and what could cause no logs to appear.`,
                healthy: `Give me a health summary of the ${app.name} application — how is it performing?`
            };
            const askUrl = `/?ask=${encodeURIComponent(prompts[app.status] || prompts.healthy)}`;

            return `
            <div class="app-card">
                <div class="app-icon ${app.status}">${icons[app.status] || '❓'}</div>
                <div class="app-info">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="app-name">${esc(displayName)}</span>
                        <a class="status-link" href="${askUrl}" title="Click to investigate with AI">
                            <span class="app-badge ${badges[app.status] || ''}">${app.status}</span>
                            <span class="investigate-hint">🔍</span>
                        </a>
                    </div>
                    <div class="app-desc">${esc(app.description)}</div>
                    <div class="app-stats">
                        <span class="app-stat"><span class="dot dot-ok"></span> ${app.total} total</span>
                        ${app.errors > 0
                            ? `<a class="app-stat error-link" href="/?ask=${encodeURIComponent('Analyze the recent errors in ' + app.name + ' application. What is happening and how can we fix it?')}" title="Click to investigate errors in AI chat"><span class="dot dot-error"></span> ${app.errors} errors ↗</a>`
                            : `<span class="app-stat"><span class="dot dot-error"></span> ${app.errors} errors</span>`}
                        <span class="app-stat"><span class="dot dot-warn"></span> ${app.warnings} warnings</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function renderIntelligence(clusters) {
        const section = document.getElementById('intel-section');
        const grid = document.getElementById('intel-grid');
        if (!section || !grid) return;

        // Count classifications from the error clusters
        const counts = { actionable: 0, noise: 0, transient: 0, known_issue: 0, configuration: 0, dependency: 0, unclassified: 0 };
        let totalClassified = 0;

        clusters.forEach(c => {
            const cls = c.ai_classification;
            if (cls && counts.hasOwnProperty(cls)) {
                counts[cls]++;
                totalClassified++;
            } else if (c.user_feedback) {
                // Count user feedback as classified too
                if (c.user_feedback === 'noise' || c.user_feedback === 'expected') counts.noise++;
                else if (c.user_feedback === 'critical') counts.actionable++;
                else counts.known_issue++;
                totalClassified++;
            } else {
                counts.unclassified++;
            }
        });

        if (totalClassified === 0 && counts.unclassified === 0) {
            section.style.display = 'none';
            return;
        }

        section.style.display = '';

        const cards = [
            { key: 'total', label: 'Classified', emoji: '🧠', count: totalClassified, cls: 'total' },
            { key: 'actionable', label: 'Actionable', emoji: '⚡', count: counts.actionable, cls: 'actionable' },
            { key: 'noise', label: 'Noise', emoji: '💤', count: counts.noise, cls: 'noise' },
            { key: 'transient', label: 'Transient', emoji: '🔄', count: counts.transient, cls: 'transient' },
            { key: 'known_issue', label: 'Known Issue', emoji: '📌', count: counts.known_issue, cls: 'known_issue' },
            { key: 'unclassified', label: 'New / Unknown', emoji: '✨', count: counts.unclassified, cls: '' },
        ];

        grid.innerHTML = cards.filter(c => c.count > 0 || c.key === 'total').map(c => `
            <div class="intel-card ${c.cls}">
                <div class="intel-emoji">${c.emoji}</div>
                <div class="intel-count">${c.count}</div>
                <div class="intel-label">${c.label}</div>
            </div>
        `).join('');
    }

    // Auto-refresh every 24 hours (86 400 000 ms)
    loadDashboard();
    setInterval(loadDashboard, 86400000);
    </script>
</body>
</html>

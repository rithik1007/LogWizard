<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echelon AI — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #1e2231;
            --border: #2e3144;
            --text-primary: #e4e6f0;
            --text-secondary: #9ba1b8;
            --text-muted: #6b7194;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --error: #ff6b6b;
            --error-bg: rgba(255,107,107,0.1);
            --warn: #ffa94d;
            --warn-bg: rgba(255,169,77,0.1);
            --success: #51cf66;
            --success-bg: rgba(81,207,102,0.1);
            --info: #339af0;
            --inactive: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ───────────────── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 28px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 26px; height: 26px; color: var(--accent); }
        .logo h1 {
            font-size: 17px; font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .nav-link {
            color: var(--text-secondary); text-decoration: none; font-size: 13px;
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
            transition: all 0.15s;
        }
        .nav-link:hover { color: var(--text-primary); border-color: var(--accent); background: rgba(108,99,255,0.08); }
        .time-select {
            background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; outline: none;
        }
        .time-select:focus { border-color: var(--accent); }
        .refresh-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 6px;
            padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: 600;
        }
        .refresh-btn:hover { background: var(--accent-hover); }
        .last-updated { font-size: 11px; color: var(--text-muted); }

        /* ── Layout ───────────────── */
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

        /* ── KPI Row ──────────────── */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            padding: 18px 20px; position: relative; overflow: hidden;
        }
        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }
        .kpi-card.total::before { background: var(--accent); }
        .kpi-card.errors::before { background: var(--error); }
        .kpi-card.warnings::before { background: var(--warn); }
        .kpi-card.healthy::before { background: var(--success); }
        .kpi-card.kb::before { background: var(--info); }
        .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
        .kpi-value { font-size: 32px; font-weight: 700; line-height: 1; }
        .kpi-card.errors .kpi-value { color: var(--error); }
        .kpi-card.warnings .kpi-value { color: var(--warn); }
        .kpi-card.healthy .kpi-value { color: var(--success); }
        .kpi-card.kb .kpi-value { color: var(--info); }
        .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* ── Charts Grid ──────────── */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px;
        }
        .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }
        .chart-container { position: relative; width: 100%; }
        .chart-container.timeline { height: 260px; }
        .chart-container.doughnut { height: 240px; display: flex; justify-content: center; }

        /* ── App Status Grid ──────── */
        .apps-section { margin-bottom: 24px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
        .app-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px 20px;
            display: flex; align-items: flex-start; gap: 14px;
        }
        .app-icon {
            width: 42px; height: 42px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .app-icon.critical { background: var(--error-bg); }
        .app-icon.warning { background: var(--warn-bg); }
        .app-icon.healthy { background: var(--success-bg); }
        .app-icon.inactive { background: rgba(74,85,104,0.2); }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .app-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-stats { display: flex; gap: 12px; font-size: 12px; }
        .app-stat { display: flex; align-items: center; gap: 4px; }
        .app-stat .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-error { background: var(--error); }
        .dot-warn { background: var(--warn); }
        .dot-ok { background: var(--success); }
        .app-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 3px 8px; border-radius: 4px; letter-spacing: 0.3px;
        }
        .badge-critical { background: var(--error-bg); color: var(--error); }
        .badge-warning { background: var(--warn-bg); color: var(--warn); }
        .badge-healthy { background: var(--success-bg); color: var(--success); }
        .badge-inactive { background: rgba(74,85,104,0.2); color: var(--inactive); }

        /* ── Error Table ──────────── */
        .errors-section { margin-bottom: 24px; }
        .error-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .error-table th {
            text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border);
        }
        .error-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .error-table tr:hover td { background: rgba(108,99,255,0.04); }
        .error-count {
            background: var(--error-bg); color: var(--error); font-weight: 700;
            padding: 2px 8px; border-radius: 10px; font-size: 12px;
        }
        .error-pattern { color: var(--text-secondary); max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .error-source { color: var(--text-muted); font-size: 12px; }

        /* ── Loading ──────────────── */
        .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
        .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14,2 14,8 20,8"/>
                <path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/>
            </svg>
            <h1>Echelon AI — Dashboard</h1>
        </div>
        <div class="header-actions">
            <a href="/" class="nav-link">← Chat</a>
            <select class="time-select" id="time-range" onchange="loadDashboard()">
                <option value="60">Last 1 Hour</option>
                <option value="360">Last 6 Hours</option>
                <option value="720">Last 12 Hours</option>
                <option value="1440" selected>Last 24 Hours</option>
                <option value="4320">Last 3 Days</option>
                <option value="10080">Last 7 Days</option>
            </select>
            <button class="refresh-btn" onclick="loadDashboard()">⟳ Refresh</button>
            <span class="last-updated" id="last-updated"></span>
        </div>
    </header>

    <div class="container" id="main-content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading dashboard data…</div>
        </div>
    </div>

    <script>
    const API = window.location.origin;
    let timelineChart = null, levelChart = null;

    async function loadDashboard() {
        const minutes = document.getElementById('time-range').value;
        const main = document.getElementById('main-content');
        main.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading dashboard data…</div></div>';

        try {
            const res = await fetch(`${API}/api/dashboard?minutes=${minutes}`);
            const d = await res.json();
            document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            render(d);
        } catch (err) {
            main.innerHTML = `<div class="loading" style="color:var(--error);">Failed to load: ${err.message}</div>`;
        }
    }

    function render(d) {
        const lv = d.level_counts;
        const errors = (lv.ERROR || 0) + (lv.FATAL || 0);
        const warnings = lv.WARN || 0;
        const info = (lv.INFO || 0) + (lv.DEBUG || 0) + (lv.TRACE || 0);
        const kb = d.kb_stats || {};

        document.getElementById('main-content').innerHTML = `
            <!-- KPI Row -->
            <div class="kpi-row">
                <div class="kpi-card total">
                    <div class="kpi-label">Total Log Entries</div>
                    <div class="kpi-value">${d.total_entries.toLocaleString()}</div>
                    <div class="kpi-sub">${d.time_range.minutes >= 1440 ? Math.round(d.time_range.minutes/1440) + ' day(s)' : Math.round(d.time_range.minutes/60) + ' hour(s)'}</div>
                </div>
                <div class="kpi-card errors">
                    <div class="kpi-label">Errors / Fatal</div>
                    <div class="kpi-value">${errors}</div>
                    <div class="kpi-sub">${d.top_error_clusters.length} distinct pattern(s)</div>
                </div>
                <div class="kpi-card warnings">
                    <div class="kpi-label">Warnings</div>
                    <div class="kpi-value">${warnings}</div>
                </div>
                <div class="kpi-card healthy">
                    <div class="kpi-label">Apps Monitored</div>
                    <div class="kpi-value">${d.apps.length}</div>
                    <div class="kpi-sub">${d.apps.filter(a=>a.status==='healthy').length} healthy · ${d.apps.filter(a=>a.status==='critical').length} critical</div>
                </div>
                <div class="kpi-card kb">
                    <div class="kpi-label">Knowledge Base</div>
                    <div class="kpi-value">${(kb.error_patterns||0) + (kb.incidents||0)}</div>
                    <div class="kpi-sub">${kb.error_patterns||0} patterns · ${kb.incidents||0} incidents</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title">Log Volume Timeline</div>
                    <div class="chart-container timeline"><canvas id="timelineChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Log Level Distribution</div>
                    <div class="chart-container doughnut"><canvas id="levelChart"></canvas></div>
                </div>
            </div>

            <!-- App Status -->
            <div class="apps-section">
                <div class="chart-title" style="margin-bottom:14px;">Application Status</div>
                <div class="apps-grid" id="apps-grid"></div>
            </div>

            <!-- Top Error Clusters -->
            <div class="errors-section">
                <div class="chart-card">
                    <div class="chart-title">Top Error Patterns</div>
                    ${d.top_error_clusters.length ? `
                    <table class="error-table">
                        <tr><th>Count</th><th>Source</th><th>Error Pattern</th></tr>
                        ${d.top_error_clusters.map(c => `
                            <tr>
                                <td><span class="error-count">${c.count}×</span></td>
                                <td><span class="error-source">${esc(c.source)}</span></td>
                                <td><span class="error-pattern" title="${esc(c.pattern)}">${esc(c.pattern)}</span></td>
                            </tr>
                        `).join('')}
                    </table>` : '<p style="color:var(--text-muted);font-size:13px;padding:12px 0;">No errors detected — all clear!</p>'}
                </div>
            </div>
        `;

        // Render charts
        renderTimelineChart(d.timeline);
        renderLevelChart(errors, warnings, info);
        renderAppCards(d.apps);
    }

    function renderTimelineChart(tl) {
        const ctx = document.getElementById('timelineChart');
        if (!ctx) return;
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tl.labels.map(l => l.split(' ')[1] || l),
                datasets: [
                    { label: 'Errors', data: tl.errors, backgroundColor: 'rgba(255,107,107,0.8)', borderRadius: 3, order: 1 },
                    { label: 'Warnings', data: tl.warnings, backgroundColor: 'rgba(255,169,77,0.7)', borderRadius: 3, order: 2 },
                    { label: 'Info', data: tl.info, backgroundColor: 'rgba(108,99,255,0.4)', borderRadius: 3, order: 3 },
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#9ba1b8', font: { size: 11 } } } },
                scales: {
                    x: { stacked: true, ticks: { color: '#6b7194', font: { size: 10 } }, grid: { color: 'rgba(46,49,68,0.5)' } },
                    y: { stacked: true, ticks: { color: '#6b7194', font: { size: 10 } }, grid: { color: 'rgba(46,49,68,0.5)' } }
                }
            }
        });
    }

    function renderLevelChart(errors, warnings, info) {
        const ctx = document.getElementById('levelChart');
        if (!ctx) return;
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Errors/Fatal', 'Warnings', 'Info/Other'],
                datasets: [{
                    data: [errors, warnings, info],
                    backgroundColor: ['rgba(255,107,107,0.85)', 'rgba(255,169,77,0.85)', 'rgba(108,99,255,0.6)'],
                    borderWidth: 0, hoverOffset: 6,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#9ba1b8', font: { size: 11 }, padding: 14 } }
                }
            }
        });
    }

    function renderAppCards(apps) {
        const grid = document.getElementById('apps-grid');
        if (!grid) return;
        grid.innerHTML = apps.map(app => {
            const icons = { critical: '🔴', warning: '⚠️', healthy: '✅', inactive: '💤' };
            const badges = {
                critical: 'badge-critical', warning: 'badge-warning',
                healthy: 'badge-healthy', inactive: 'badge-inactive'
            };
            return `
            <div class="app-card">
                <div class="app-icon ${app.status}">${icons[app.status] || '❓'}</div>
                <div class="app-info">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="app-name">${esc(app.name.length <= 4 ? app.name.toUpperCase() : app.name.charAt(0).toUpperCase() + app.name.slice(1))}</span>
                        <span class="app-badge ${badges[app.status] || ''}">${app.status}</span>
                    </div>
                    <div class="app-desc">${esc(app.description)}</div>
                    <div class="app-stats">
                        <span class="app-stat"><span class="dot dot-ok"></span> ${app.total} total</span>
                        <span class="app-stat"><span class="dot dot-error"></span> ${app.errors} errors</span>
                        <span class="app-stat"><span class="dot dot-warn"></span> ${app.warnings} warnings</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // Auto-refresh every 60 seconds
    loadDashboard();
    setInterval(loadDashboard, 60000);
    </script>
</body>
</html>

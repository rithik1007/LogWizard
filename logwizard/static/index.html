<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogWizard — AI Log Analyst</title>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-tertiary: #242736;
            --border: #2e3144;
            --text-primary: #e4e6f0;
            --text-secondary: #9ba1b8;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --error: #ff6b6b;
            --warn: #ffa94d;
            --success: #51cf66;
            --info: #339af0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg { width: 28px; height: 28px; }

        .logo h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .status-dot.ok { background: var(--success); }
        .status-dot.err { background: var(--error); }

        .kb-stats { opacity: 0.7; }

        /* ── Chat Area ────────────────────────────── */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-track { background: transparent; }
        #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.assistant h3 {
            color: var(--accent);
            font-size: 14px;
            margin: 14px 0 6px;
        }

        .message.assistant h3:first-child { margin-top: 0; }

        .message.assistant p { margin: 6px 0; }

        .message.assistant code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }

        .message.assistant pre {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }

        .message.assistant ul, .message.assistant ol {
            margin: 6px 0 6px 20px;
        }

        .message.assistant li { margin: 3px 0; }

        .message.assistant strong { color: #c5c1ff; }

        /* Timeline / table styling inside responses */
        .message.assistant table {
            width: 100%;
            margin: 8px 0;
            border-collapse: collapse;
        }
        .message.assistant th, .message.assistant td {
            padding: 6px 10px;
            border: 1px solid var(--border);
            font-size: 13px;
            text-align: left;
        }
        .message.assistant th {
            background: var(--bg-primary);
            font-weight: 600;
        }

        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* ── Welcome screen ───────────────────────── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .welcome svg { width: 64px; height: 64px; opacity: 0.5; }

        .welcome h2 {
            font-size: 22px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .welcome p { max-width: 480px; line-height: 1.6; }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .quick-prompts button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .quick-prompts button:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ── Input Area ───────────────────────────── */
        .input-area {
            padding: 16px 24px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 900px;
            margin: 0 auto;
        }

        #user-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.15s;
        }

        #user-input:focus { border-color: var(--accent); }

        #user-input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        #send-btn {
            width: 44px; height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #send-btn svg { width: 20px; height: 20px; }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14,2 14,8 20,8"/>
                <path d="M8 13h2"/><path d="M8 17h2"/>
                <path d="M14 13h2"/><path d="M14 17h2"/>
            </svg>
            <h1>LogWizard</h1>
        </div>
        <div class="status-bar">
            <span id="connection-status"><span class="status-dot" id="status-dot"></span> <span id="status-text">Connecting…</span></span>
            <span class="kb-stats" id="kb-stats"></span>
        </div>
    </header>

    <div id="chat-area">
        <div class="welcome" id="welcome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14,2 14,8 20,8"/>
                <circle cx="12" cy="15" r="3"/>
                <path d="M12 12v-1"/>
            </svg>
            <h2>What happened in production?</h2>
            <p>I'm an AI log analyst. Ask me about incidents, errors, or anomalies and I'll investigate your logs, identify root causes, and suggest fixes.</p>
            <div class="quick-prompts">
                <button onclick="sendQuick(this.textContent)">What errors occurred in the last hour?</button>
                <button onclick="sendQuick(this.textContent)">Analyse the logs from 2:30 PM to 2:45 PM today</button>
                <button onclick="sendQuick(this.textContent)">Were there any deployment issues today?</button>
                <button onclick="sendQuick(this.textContent)">Show me knowledge base stats</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea id="user-input" rows="1" placeholder="Ask about a production incident…" autofocus></textarea>
            <button id="send-btn" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22,2 15,22 11,13 2,9"/>
                </svg>
            </button>
        </div>
        <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeEl = document.getElementById('welcome');
        let isStreaming = false;

        // ── Health check ─────────────────────────
        async function checkHealth() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const kb = document.getElementById('kb-stats');
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                dot.className = 'status-dot ok';
                text.textContent = 'Connected';
                if (data.knowledge_base) {
                    const s = data.knowledge_base;
                    kb.textContent = `KB: ${s.error_patterns} patterns · ${s.incidents} incidents`;
                }
            } catch {
                dot.className = 'status-dot err';
                text.textContent = 'Disconnected';
            }
        }
        checkHealth();
        setInterval(checkHealth, 30000);

        // ── Auto-resize textarea ─────────────────
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
        });

        // ── Send message ─────────────────────────
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isStreaming) return;

            // Hide welcome
            if (welcomeEl) welcomeEl.remove();

            // User bubble
            appendMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            isStreaming = true;
            sendBtn.disabled = true;

            // Typing indicator
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(typing);
            scrollToBottom();

            try {
                const res = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                typing.remove();

                if (!res.ok) {
                    appendMessage(`Error: ${res.status} ${res.statusText}`, 'assistant');
                    return;
                }

                // Stream the response
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                const msgEl = appendMessage('', 'assistant');
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    msgEl.innerHTML = renderMarkdown(fullText);
                    scrollToBottom();
                }

                if (!fullText) {
                    msgEl.innerHTML = '<em>No response generated.</em>';
                }

            } catch (err) {
                typing.remove();
                appendMessage(`Connection error: ${err.message}`, 'assistant');
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                userInput.focus();
                checkHealth();
            }
        }

        function appendMessage(text, role) {
            const el = document.createElement('div');
            el.className = `message ${role}`;
            if (role === 'user') {
                el.textContent = text;
            } else {
                el.innerHTML = renderMarkdown(text);
            }
            chatArea.appendChild(el);
            scrollToBottom();
            return el;
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ── Minimal Markdown renderer ────────────
        function renderMarkdown(text) {
            if (!text) return '';
            let html = text
                // Code blocks
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Headers
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/^# (.+)$/gm, '<h3>$1</h3>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Unordered lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // Ordered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                // Paragraphs (double newline)
                .replace(/\n\n/g, '</p><p>')
                // Single newlines
                .replace(/\n/g, '<br>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, '<ul>$1</ul>');
            html = html.replace(/<br><\/ul>/g, '</ul>');
            html = html.replace(/<ul><br>/g, '<ul>');

            return `<p>${html}</p>`.replace(/<p><\/p>/g, '');
        }
    </script>
</body>
</html>
